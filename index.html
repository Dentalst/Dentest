<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>치아 나이 자가진단</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --dark: #1A1A18;
    --accent: #2D5F3F;
    --accent-light: #4A8C62;
    --warn: #C4562A;
    --border: #D4CFC4;
    --text-muted: #6B6860;
    --card: #FDFAF4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--dark);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* INTRO SCREEN */
  #intro {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 24px;
    position: relative;
    text-align: center;
  }

  .badge {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
    border: 1px solid var(--accent);
    padding: 6px 14px;
    margin-bottom: 32px;
    text-transform: uppercase;
  }

  .intro-title {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(32px, 8vw, 52px);
    font-weight: 700;
    line-height: 1.2;
    margin-bottom: 12px;
    letter-spacing: -1px;
  }

  .intro-title span {
    color: var(--accent);
    position: relative;
    display: inline-block;
  }

  .intro-subtitle {
    font-size: 15px;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 320px;
    margin: 0 auto 40px;
  }

  .intro-meta {
    display: flex;
    gap: 24px;
    justify-content: center;
    margin-bottom: 48px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .meta-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--dark);
  }

  .meta-label {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
  }

  .divider-v {
    width: 1px;
    height: 40px;
    background: var(--border);
    align-self: center;
  }

  .start-btn {
    background: var(--dark);
    color: var(--cream);
    border: none;
    padding: 18px 48px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .start-btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  .start-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  .age-input-wrap {
    margin-bottom: 32px;
    text-align: left;
    width: 100%;
    max-width: 260px;
  }

  .age-input-label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
    font-family: 'DM Mono', monospace;
  }

  .age-input {
    width: 100%;
    padding: 14px 16px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-family: 'DM Mono', monospace;
    font-size: 24px;
    color: var(--dark);
    outline: none;
    text-align: center;
    transition: border-color 0.15s;
  }

  .age-input:focus {
    border-color: var(--accent);
  }

  .age-input::placeholder {
    color: var(--border);
  }

  .disclaimer {
    margin-top: 20px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'DM Mono', monospace;
  }

  /* DECORATIVE */
  .tooth-deco {
    font-size: 80px;
    margin-bottom: 24px;
    opacity: 0.15;
    position: absolute;
    top: 40px;
    right: 20px;
    transform: rotate(15deg);
    pointer-events: none;
  }

  /* QUIZ SCREEN */
  #quiz {
    display: none;
    min-height: 100vh;
    padding: 0;
  }

  .quiz-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--cream);
    z-index: 10;
  }

  .quiz-logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .progress-wrap {
    flex: 1;
    margin: 0 20px;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.4s ease;
    width: 0%;
  }

  .progress-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 4px;
  }

  .question-container {
    padding: 48px 24px 32px;
    max-width: 500px;
    margin: 0 auto;
  }

  .q-number {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 2px;
    margin-bottom: 16px;
  }

  .q-text {
    font-family: 'Noto Serif KR', serif;
    font-size: clamp(18px, 5vw, 24px);
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 8px;
  }

  .q-ref {
    display: inline-block;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: #EBF5EF;
    border: 1px solid #A8D4B8;
    padding: 3px 8px;
    margin-bottom: 28px;
    letter-spacing: 0.5px;
  }

  .q-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .likert-wrap {
    display: grid;
    grid-template-columns: 1fr;
    gap: 10px;
  }

  .likert-option {
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 18px 20px;
    background: var(--card);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    min-height: 68px;
    border-radius: 2px;
  }

  .likert-option:active { transform: scale(0.97); }

  .likert-option:hover {
    border-color: var(--accent);
    background: #F0F7F3;
  }

  .likert-option.selected {
    border-color: var(--accent);
    background: #E8F4ED;
    box-shadow: inset 0 0 0 1px var(--accent);
  }

  .option-score {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .likert-option.selected .option-score { color: var(--accent); }

  .option-text {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.4;
    color: var(--dark);
  }

  .option-check {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    font-size: 9px;
    display: none;
    align-items: center;
    justify-content: center;
  }

  .likert-option.selected .option-check { display: flex; }

  .nav-btns {
    display: none;
  }

  .nav-btn {
    flex: 1;
    padding: 16px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    transition: all 0.15s;
  }

  .nav-btn.primary {
    background: var(--dark);
    color: var(--cream);
    border-color: var(--dark);
  }

  .nav-btn.primary:hover {
    background: var(--accent);
    border-color: var(--accent);
  }

  .nav-btn.secondary:hover {
    border-color: var(--dark);
  }

  .nav-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* RESULT SCREEN */
  #result {
    display: none;
    min-height: 100vh;
    padding: 0;
  }

  .result-header {
    padding: 24px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  .result-logo {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--text-muted);
  }

  .report-wrap {
    max-width: 500px;
    margin: 0 auto;
    padding: 40px 24px 60px;
  }

  .report-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
  }

  .age-compare-wrap {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 40px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }

  .age-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .age-col-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .age-col-num {
    font-family: 'Noto Serif KR', serif;
    font-size: 72px;
    font-weight: 700;
    line-height: 1;
  }

  .age-col-num.real { color: var(--text-muted); }
  .age-col-num.dental-ok { color: var(--accent); }
  .age-col-num.dental-warn { color: var(--warn); }
  .age-col-num.dental-caution { color: #C4952A; }

  .age-col-unit {
    font-size: 16px;
    font-weight: 400;
    color: inherit;
    margin-top: 4px;
  }

  .age-arrow {
    font-size: 28px;
    color: var(--border);
    padding: 0 8px;
    padding-top: 20px;
  }

  .age-diff {
    text-align: center;
    margin-top: 16px;
    font-size: 13px;
  }

  .age-diff.up { color: var(--warn); font-weight: 500; }
  .age-diff.down { color: var(--accent); font-weight: 500; }
  .age-diff.same { color: var(--text-muted); }

  .type-badge {
    display: inline-block;
    padding: 8px 20px;
    margin: 8px 0 24px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 1px;
  }

  .type-badge.warn { background: #FDF0EB; color: var(--warn); border: 1px solid #E8B9A8; }
  .type-badge.caution { background: #FDF8EB; color: #B07A20; border: 1px solid #E8D8A8; }
  .type-badge.ok { background: #EBF5EF; color: var(--accent); border: 1px solid #A8D4B8; }

  .section-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  .analysis-items {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .analysis-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px;
    background: var(--card);
    border: 1px solid var(--border);
  }

  .item-icon { font-size: 16px; margin-top: 1px; }

  .item-content { flex: 1; }

  .item-title {
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .item-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.6;
  }

  .score-bar-wrap {
    margin-bottom: 32px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .score-name {
    font-size: 12px;
    color: var(--text-muted);
    min-width: 80px;
  }

  .score-bar {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .score-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }

  .score-fill.bad { background: var(--warn); }
  .score-fill.mid { background: #C4952A; }
  .score-fill.good { background: var(--accent); }

  .score-val {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    min-width: 30px;
    text-align: right;
  }

  .cta-box {
    background: var(--dark);
    color: var(--cream);
    padding: 32px 24px;
    text-align: center;
    margin-top: 40px;
  }

  .cta-box-title {
    font-family: 'Noto Serif KR', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }

  .cta-box-desc {
    font-size: 13px;
    opacity: 0.7;
    line-height: 1.6;
    margin-bottom: 24px;
  }

  .cta-btn {
    display: block;
    background: var(--accent);
    color: white;
    padding: 16px 32px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    transition: background 0.2s;
    margin-bottom: 12px;
  }

  .cta-btn:hover { background: var(--accent-light); }

  .share-btns {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }

  .share-btn {
    flex: 1;
    padding: 13px;
    border: 1px solid rgba(255,255,255,0.25);
    background: transparent;
    color: rgba(255,255,255,0.75);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .share-btn:hover {
    background: rgba(255,255,255,0.1);
    color: white;
    border-color: rgba(255,255,255,0.5);
  }

  .share-btn:active { transform: scale(0.97); }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--dark);
    color: var(--cream);
    padding: 12px 24px;
    font-size: 13px;
    font-family: 'Noto Sans KR', sans-serif;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
    background: transparent;
    border: 1px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.6);
    padding: 12px 24px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    width: 100%;
    transition: all 0.2s;
  }

  .retry-btn:hover {
    border-color: rgba(255,255,255,0.6);
    color: white;
  }

  .ref-note {
    margin-top: 32px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.8;
    font-family: 'DM Mono', monospace;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-up { animation: fadeUp 0.5s ease forwards; }

  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }

  .age-number { animation: countUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div id="toast" class="toast"></div>

<!-- INTRO -->
<div id="intro">
  <div class="tooth-deco">🦷</div>
  
  <h1 class="intro-title">
    내 치아의<br>실제 나이는<br><span>몇 살일까?</span>
  </h1>
  <p class="intro-subtitle">
    생활습관으로 예측하는 치아 생물학적 나이.<br>
    당신의 치아는 당신보다 빠르게 늙고 있을 수 있습니다.
  </p>
  <div class="intro-meta">
    <div class="meta-item">
      <span class="meta-num">8</span>
      <span class="meta-label">문항</span>
    </div>
    <div class="divider-v"></div>
    <div class="meta-item">
      <span class="meta-num">2분</span>
      <span class="meta-label">소요</span>
    </div>
    <div class="divider-v"></div>
    <div class="meta-item">
      <span class="meta-num">무료</span>
      <span class="meta-label">진단</span>
    </div>
  </div>
  <div class="age-input-wrap">
    <label class="age-input-label">나의 실제 나이</label>
    <input class="age-input" type="number" id="ageInput" min="10" max="99" placeholder="25" oninput="checkAge()">
  </div>
  <button class="start-btn" id="startBtn" onclick="startQuiz()" disabled>검사 시작하기</button>
  <p class="disclaimer">* 본 검사는 임상 지표를 단순화한 자가진단용입니다</p>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="quiz-header">
    
    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressLabel">0 / 8</div>
    </div>
  </div>

  <div class="question-container" id="questionContainer"></div>

  <div class="nav-btns">
    <button class="nav-btn secondary" id="prevBtn" onclick="prevQ()" disabled>← 이전</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextQ()" disabled>다음 →</button>
  </div>
</div>

<!-- RESULT -->
<div id="result">
  <div class="result-header">
    
  </div>
  <div class="report-wrap" id="reportWrap"></div>
</div>

<script>
const questions = [
  {
    text: "마지막으로 치과에 가신 게 언제인가요?",
    desc: "정기 치과 방문은 충치 위험을 조기에 차단하는 가장 효과적인 방법이에요.",
    ref: "ADA CRA · Dental Home 항목",
    options: [
      { text: "6개월 이내", score: 0 },
      { text: "1년 이내", score: 1 },
      { text: "2년 이내", score: 2 },
      { text: "2년 넘었거나 기억이 안 나요", score: 4 },
    ]
  },
  {
    text: "평소에 단 음식이나 음료를 자주 드시나요?",
    desc: "탄산음료, 에너지드링크, 주스, 과자 — 식사 사이에 자주 드실수록 충치 위험이 높아져요.",
    ref: "ADA CRA · Sugary Foods or Drinks 항목",
    options: [
      { text: "거의 안 먹어요", score: 0 },
      { text: "하루 1~2번 정도", score: 1 },
      { text: "자주 먹는 편이에요", score: 3 },
      { text: "수시로 먹어요", score: 4 },
    ]
  },
  {
    text: "치약 구매 시 성분을 확인하시나요?",
    desc: "불소(Fluoride) 함유 치약은 충치 발생 위험을 최대 25% 낮춰줍니다.",
    ref: "ADA CRA · Fluoride Exposure 항목 / ADA, 2021",
    options: [
      { text: "불소 치약을 꼭 사용해요", score: 0 },
      { text: "그냥 아무거나 써요", score: 2 },
      { text: "치약 종류를 생각해본 적 없어요", score: 3 },
      { text: "천연·무불소 치약을 써요", score: 4 },
    ]
  },
  {
    text: "입이 자주 마르거나 물을 항상 달고 사시나요?",
    desc: "침이 부족하면 세균이 번식하기 쉬워져 충치·잇몸 질환 위험이 크게 올라가요.",
    ref: "ADA CRA · Xerostomia(구강건조증) 항목",
    options: [
      { text: "전혀 아니에요", score: 0 },
      { text: "가끔 마른 느낌이 들어요", score: 1 },
      { text: "자주 마른 편이에요", score: 3 },
      { text: "항상 마르고 물 없으면 불편해요", score: 4 },
    ]
  },
  {
    text: "칫솔질할 때 잇몸에서 피가 난 적 있으신가요?",
    desc: "건강한 잇몸은 칫솔질로 피가 나지 않아요. 출혈은 치은염의 대표적인 초기 신호예요.",
    ref: "AAP(미국치주과학회) 치은염 진단 기준",
    options: [
      { text: "한 번도 없어요", score: 0 },
      { text: "가끔 있어요", score: 2 },
      { text: "자주 있어요", score: 3 },
      { text: "거의 매번 나요", score: 4 },
    ]
  },
  {
    text: "찬 음식을 먹을 때 시린 느낌이 있으신가요?",
    desc: "차가운 음식에 시린 느낌은 법랑질 손상이나 잇몸 퇴축의 신호일 수 있어요.",
    ref: "NIDCR · 치아 과민증 임상 지표",
    options: [
      { text: "전혀 없어요", score: 0 },
      { text: "가끔 있어요", score: 2 },
      { text: "자주 있어요", score: 3 },
      { text: "항상 있어서 찬 건 피해요", score: 4 },
    ]
  },
  {
    text: "아침에 일어나면 턱이 뻐근하거나 머리가 무거우신가요?",
    desc: "수면 중 이갈이(bruxism)는 치아 마모와 균열의 주요 원인이에요. 본인은 모르는 경우가 많아요.",
    ref: "AASM · 수면 이갈이 자가 보고 지표",
    options: [
      { text: "전혀 없어요", score: 0 },
      { text: "가끔 있어요", score: 2 },
      { text: "자주 있어요", score: 3 },
      { text: "거의 매일 있어요", score: 4 },
    ]
  },
  {
    text: "현재 치아에 신경 쓰이는 부분이 있으신가요?",
    desc: "불편함을 느끼면서도 치과를 미루는 경우가 많아요. 초기일수록 치료가 간단해집니다.",
    ref: "ADA CRA · 전반적 임상 자가 인식 항목",
    options: [
      { text: "없어요, 멀쩡해요", score: 0 },
      { text: "약간 신경 쓰이는 곳이 있어요", score: 2 },
      { text: "불편한 치아가 있어요", score: 3 },
      { text: "아픈데 그냥 참고 있어요", score: 4 },
    ]
  }
];

let current = 0;
let answers = new Array(questions.length).fill(null);
let realAge = 25;

function checkAge() {
  const val = parseInt(document.getElementById('ageInput').value);
  const btn = document.getElementById('startBtn');
  if (val >= 10 && val <= 99) {
    realAge = val;
    btn.disabled = false;
  } else {
    btn.disabled = true;
  }
}

function startQuiz() {
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  const q = questions[current];
  const pct = ((current) / questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${current + 1} / ${questions.length}`;

  const container = document.getElementById('questionContainer');
  container.innerHTML = `
    <div class="q-number fade-up">Q${String(current + 1).padStart(2, '0')}</div>
    <div class="q-text fade-up" style="animation-delay:0.05s">${q.text}</div>
    <div class="q-desc fade-up" style="animation-delay:0.1s">${q.desc}</div>
    <div class="q-ref fade-up" style="animation-delay:0.12s">📎 ${q.ref}</div>
    <div class="likert-wrap fade-up" style="animation-delay:0.15s">
      ${q.options.map((opt, i) => `
        <div class="likert-option ${answers[current] === i ? 'selected' : ''}" onclick="selectOption(${i})">
          <div class="option-check">✓</div>
          <span class="option-score">${String.fromCharCode(65 + i)}</span>
          <span class="option-text">${opt.text}</span>
        </div>
      `).join('')}
    </div>
  `;

  document.getElementById('prevBtn').disabled = current === 0;
  document.getElementById('nextBtn').disabled = answers[current] === null;

  if (current === questions.length - 1) {
    document.getElementById('nextBtn').textContent = '결과 보기 →';
  } else {
    document.getElementById('nextBtn').textContent = '다음 →';
  }
}

function selectOption(idx) {
  answers[current] = idx;
  renderQuestion();
  setTimeout(function() {
    if (current < questions.length - 1) {
      current++;
      renderQuestion();
    } else {
      showResult();
    }
  }, 400);
}

function prevQ() {
  if (current > 0) { current--; renderQuestion(); }
}

function nextQ() {
  if (answers[current] === null) return;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById('quiz').style.display = 'none';
  document.getElementById('result').style.display = 'block';

  // 카테고리별 점수
  var managementScore = (answers[0] !== null ? questions[0].options[answers[0]].score : 0)  // 치과 방문
                      + (answers[1] !== null ? questions[1].options[answers[1]].score : 0)  // 단 음식
                      + (answers[2] !== null ? questions[2].options[answers[2]].score : 0); // 불소치약

  var erosionRawScore = (answers[1] !== null ? questions[1].options[answers[1]].score : 0)  // 단 음식
                      + (answers[3] !== null ? questions[3].options[answers[3]].score : 0); // 구강건조

  var bruxismRawScore = (answers[6] !== null ? questions[6].options[answers[6]].score : 0); // 이갈이

  var symptomRawScore = (answers[4] !== null ? questions[4].options[answers[4]].score : 0)  // 출혈
                      + (answers[5] !== null ? questions[5].options[answers[5]].score : 0)  // 시림
                      + (answers[7] !== null ? questions[7].options[answers[7]].score : 0); // 통증

  // 가장 높은 카테고리 찾기
  var categories = [
    { key: 'management', score: managementScore, max: 12 },
    { key: 'erosion',    score: erosionRawScore, max: 8 },
    { key: 'bruxism',   score: bruxismRawScore, max: 4 },
    { key: 'symptom',   score: symptomRawScore, max: 12 },
  ];

  var dominant = categories.reduce(function(a, b) {
    return (a.score / a.max) >= (b.score / b.max) ? a : b;
  });

  var typeMap = {
    management: { name: "치과 3년 장기결석 우수상", badge: "관리 공백", desc: "정기 방문과 위생 관리에 공백이 쌓이고 있어요. 지금부터 시작하면 충분히 회복 가능합니다." },
    erosion:    { name: "아메리카노 법랑질 용해중", badge: "산 부식",  desc: "단 음료와 건조한 구강 환경이 치아 표면을 서서히 녹이고 있을 수 있어요." },
    bruxism:    { name: "수면중 무의식 치아 분쇄기", badge: "이갈이",   desc: "자는 동안 이를 갈고 있을 가능성이 높아요. 치아 균열과 마모의 주요 원인입니다." },
    symptom:    { name: "잇몸 경고등 점등중",        badge: "증상 누적", desc: "시림, 출혈, 통증 등 여러 신호가 동시에 나타나고 있어요. 지금 바로 확인이 필요합니다." },
    good:       { name: "치아 모범생 (희귀종)",       badge: "양호",     desc: "구강 관리를 꾸준히 잘 하고 계세요. 이 상태 유지가 핵심입니다." },
  };

  var dominantType = ratio < 0.2 ? typeMap['good'] : typeMap[dominant.key];

  var totalScore = answers.reduce(function(sum, ansIdx, qIdx) {
    return sum + (ansIdx !== null ? questions[qIdx].options[ansIdx].score : 0);
  }, 0);

  var maxScore = questions.length * 4;
  var ratio = totalScore / maxScore;

  var dentalAge, typeClass, dentalClass, typeBadge;

  if (ratio < 0.2) {
    dentalAge = Math.max(10, realAge - Math.floor(Math.random() * 4 + 2));
    typeClass = "ok"; dentalClass = "dental-ok"; typeBadge = "✓ 양호";
  } else if (ratio < 0.45) {
    dentalAge = realAge + Math.floor(ratio * 20 + 5);
    typeClass = "caution"; dentalClass = "dental-caution"; typeBadge = "⚠ 주의";
  } else {
    dentalAge = realAge + Math.floor(ratio * 30 + 15);
    typeClass = "warn"; dentalClass = "dental-warn"; typeBadge = "⚡ 즉시 점검";
  }

  var analyses = [
    { icon: "🔬", title: "주요 유형: " + dominantType.name, desc: dominantType.desc },
    { icon: "📊", title: "종합 위험도", desc: ratio < 0.2 ? "전반적으로 구강 건강이 양호하게 유지되고 있습니다." : ratio < 0.45 ? "일부 항목에서 위험 신호가 감지됩니다. 조기 관리가 중요합니다." : "복합적인 위험 신호가 확인됩니다. 전문 진단이 필요합니다." },
    { icon: "💡", title: "지금 할 수 있는 것", desc: dominant.key === 'erosion' ? "산성 음료 후 물로 입 헹구기, 불소 치약으로 교체하기" : dominant.key === 'bruxism' ? "자기 전 턱 긴장 풀기, 수면 이갈이 마우스가드 상담" : dominant.key === 'symptom' ? "통증 부위 기록 후 치과 방문, 방치 금지" : "6개월에 한 번 정기 검진 예약하기" },
  ];

  var type = dominantType.name;

  const diff = dentalAge - realAge;
  const diffText = diff > 0
    ? `<span class="age-diff up">▲ 실제 나이보다 ${diff}세 더 노화</span>`
    : diff < 0
    ? `<span class="age-diff down">▼ 실제 나이보다 ${Math.abs(diff)}세 더 젊음</span>`
    : `<span class="age-diff same">실제 나이와 동일</span>`;

  // 세부 점수 계산
  const hygieneScore = Math.round(100 - managementScore / 12 * 100);
  const erosionScore = Math.round(100 - erosionRawScore / 8 * 100);
  const symptomScore = Math.round(100 - symptomRawScore / 12 * 100);

  let ctaTitle, ctaDesc, ctaBtn;

  if (ratio < 0.2) {
    ctaTitle = "관리 잘 하고 계시네요!";
    ctaDesc = "그래도 정기 검진은 필수예요.<br>스케일링은 <strong>서비스로</strong> 해드립니다.";
    ctaBtn = "무료 검진 문의하기";
  } else if (ratio < 0.45) {
    ctaTitle = "지금 한 번 확인해보세요.";
    ctaDesc = "아직 초기 단계일 가능성이 높아요.<br>지금 치료하면 간단하게 끝납니다 — <strong>비용 없이</strong>.";
    ctaBtn = "무료로 확인하러 가기";
  } else {
    ctaTitle = "지금 바로 확인이 필요해요.";
    ctaDesc = "방치할수록 치료가 복잡해져요.<br>광주 어디서든 <strong>교통비까지 지원</strong>해드립니다.";
    ctaBtn = "지금 바로 문의하기";
  }

  const getBarClass = (val) => val >= 70 ? 'good' : val >= 40 ? 'mid' : 'bad';

  var analysisHTML = analyses.map(function(a) {
    return '<div class="analysis-item"><span class="item-icon">' + a.icon + '</span><div class="item-content"><div class="item-title">' + a.title + '</div><div class="item-desc">' + a.desc + '</div></div></div>';
  }).join('');

  var html = ''
    + '<div class="age-compare-wrap fade-up"><div class="age-col"><div class="age-col-label">실제 나이</div><div class="age-col-num real">' + realAge + '</div><div class="age-col-unit" style="color:var(--text-muted)">세</div></div><div class="age-arrow">→</div><div class="age-col"><div class="age-col-label">치아 나이</div><div class="age-col-num ' + dentalClass + '">' + dentalAge + '</div><div class="age-col-unit" style="color:inherit">세</div></div></div>'
    + '<div style="text-align:center;margin-bottom:24px;">' + diffText + '<br><br><span class="type-badge ' + typeClass + '">' + typeBadge + ' · ' + type + '</span></div>'
    + '<div class="section-title fade-up">세부 분석</div>'
    + '<div class="score-bar-wrap fade-up">'
    + '<div class="score-row"><span class="score-name">위생 관리</span><div class="score-bar"><div class="score-fill ' + getBarClass(hygieneScore) + '" style="width:' + hygieneScore + '%"></div></div><span class="score-val">' + hygieneScore + '점</span></div>'
    + '<div class="score-row"><span class="score-name">산 부식 위험</span><div class="score-bar"><div class="score-fill ' + getBarClass(erosionScore) + '" style="width:' + erosionScore + '%"></div></div><span class="score-val">' + erosionScore + '점</span></div>'
    + '<div class="score-row"><span class="score-name">증상 없음</span><div class="score-bar"><div class="score-fill ' + getBarClass(symptomScore) + '" style="width:' + symptomScore + '%"></div></div><span class="score-val">' + symptomScore + '점</span></div>'
    + '</div>'
    + '<div class="section-title fade-up">주요 발견 사항</div>'
    + '<div class="analysis-items fade-up">' + analysisHTML + '</div>'
    + '<div class="cta-box fade-up"><div class="cta-box-title">' + ctaTitle + '</div><div class="cta-box-desc">' + ctaDesc + '</div><a class="cta-btn" href="https://open.kakao.com/o/sllXWTvi" target="_blank">📩 ' + ctaBtn + '</a><div class="share-btns"><button class="share-btn" onclick="copyLink()">🔗 링크 복사</button><button class="share-btn" onclick="saveImage()">📷 이미지 저장</button></div><button class="retry-btn" onclick="retryTest()">↺ 다시 테스트하기</button></div>'
    + '<div class="ref-note fade-up">본 검사는 자가진단 목적으로 제작되었으며 임상적 진단을 대체하지 않습니다.<br>기반 자료: ADA Caries Risk Assessment Form (Age >6, 2011) · AAP 치은염 진단 기준 · AASM 수면 이갈이 지표 · NIDCR 치아 과민증 임상 지표<br>제작: </div>';

  document.getElementById('reportWrap').innerHTML = html;

  window.scrollTo(0, 0);
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function copyLink() {
  var url = window.location.href;
  try {
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(url).then(function() {
        showToast('✓ 링크가 복사되었어요!');
      }).catch(function() {
        fallbackCopy(url);
      });
    } else {
      fallbackCopy(url);
    }
  } catch(e) {
    fallbackCopy(url);
  }
}

function fallbackCopy(url) {
  var ta = document.createElement('textarea');
  ta.value = url;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try {
    document.execCommand('copy');
    showToast('✓ 링크가 복사되었어요!');
  } catch(e) {
    showToast('주소창 URL을 직접 복사해주세요');
  }
  document.body.removeChild(ta);
}

function saveImage() {
  showToast('이미지 생성 중...');
  var target = document.getElementById('reportWrap');
  var scrollY = window.scrollY;
  window.scrollTo(0, 0);
  setTimeout(function() {
    html2canvas(target, {
      backgroundColor: '#F5F0E8',
      scale: 2,
      useCORS: true,
      allowTaint: true,
      logging: false
    }).then(function(canvas) {
      var link = document.createElement('a');
      link.download = '치아나이_결과.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      window.scrollTo(0, scrollY);
      showToast('✓ 이미지 저장 완료!');
    }).catch(function() {
      showToast('화면을 길게 눌러 스크린샷으로 저장해주세요');
    });
  }, 300);
}

function retryTest() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  realAge = 25;
  document.getElementById('result').style.display = 'none';
  document.getElementById('intro').style.display = 'flex';
  document.getElementById('ageInput').value = '';
  document.getElementById('startBtn').disabled = true;
  window.scrollTo(0, 0);
}
</script>
</body>
</html>
